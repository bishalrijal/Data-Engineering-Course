services:
  postgres:
    image: postgres:16
    container_name: course_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ridedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./rides.csv:/data/rides.csv:ro
      - .:/scripts
    restart: unless-stopped

volumes:
  postgres_data:
